<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- LEFT: code editor mockup -->
  <rect x="50" y="60" width="330" height="270" rx="10" fill="#030712" stroke="#4f46e5" stroke-width="2"/>
  <rect x="50" y="60" width="330" height="28" rx="10" fill="#1e1b4b"/>
  <rect x="50" y="78" width="330" height="10" fill="#1e1b4b"/>
  <circle cx="72" cy="74" r="5" fill="#ef4444"/>
  <circle cx="87" cy="74" r="5" fill="#eab308"/>
  <circle cx="102" cy="74" r="5" fill="#22c55e"/>
  <text x="215" y="78" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="11">index.js</text>
  <!-- Code lines -->
  <text x="70" y="120" fill="#f43f5e" font-family="monospace" font-size="14">const</text>
  <text x="112" y="120" fill="#e2e8f0" font-family="monospace" font-size="14">app =</text>
  <text x="150" y="120" fill="#a855f7" font-family="monospace" font-size="14">express()</text>
  <text x="70" y="148" fill="#38bdf8" font-family="monospace" font-size="14">app</text>
  <text x="94" y="148" fill="#e2e8f0" font-family="monospace" font-size="14">.get(</text>
  <text x="130" y="148" fill="#10b981" font-family="monospace" font-size="14">'/'</text>
  <text x="155" y="148" fill="#e2e8f0" font-family="monospace" font-size="14">, (req,res) =&gt;</text>
  <text x="90" y="176" fill="#e2e8f0" font-family="monospace" font-size="14">res.json(</text>
  <text x="163" y="176" fill="#eab308" font-family="monospace" font-size="14">{ok:true}</text>
  <text x="232" y="176" fill="#e2e8f0" font-family="monospace" font-size="14">))</text>
  <text x="70" y="210" fill="#38bdf8" font-family="monospace" font-size="14">app</text>
  <text x="94" y="210" fill="#e2e8f0" font-family="monospace" font-size="14">.listen(</text>
  <text x="155" y="210" fill="#10b981" font-family="monospace" font-size="14">3000</text>
  <text x="192" y="210" fill="#e2e8f0" font-family="monospace" font-size="14">)</text>
  <!-- DB icon below code -->
  <ellipse cx="215" cy="270" rx="55" ry="15" fill="none" stroke="#6366f1" stroke-width="2"/>
  <rect x="160" y="270" width="110" height="35" fill="none" stroke="#6366f1" stroke-width="2"/>
  <ellipse cx="215" cy="305" rx="55" ry="15" fill="none" stroke="#6366f1" stroke-width="2"/>
  <text x="215" y="290" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="11">SQL / NoSQL</text>

  <!-- RIGHT: browser mockup -->
  <rect x="420" y="60" width="330" height="270" rx="10" fill="#020617" stroke="#ec4899" stroke-width="2"/>
  <rect x="420" y="60" width="330" height="28" rx="10" fill="#1f2937"/>
  <rect x="420" y="78" width="330" height="10" fill="#1f2937"/>
  <rect x="450" y="66" width="200" height="16" rx="8" fill="#374151"/>
  <text x="550" y="78" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">localhost:3000</text>
  <!-- Browser content -->
  <rect x="440" y="100" width="290" height="50" rx="6" fill="#1e1b4b"/>
  <text x="585" y="120" text-anchor="middle" fill="#a855f7" font-family="Arial" font-size="16" font-weight="bold">Full Stack App</text>
  <text x="585" y="138" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">React + Node + MongoDB</text>
  <rect x="440" y="165" width="135" height="80" rx="6" fill="#0f172a" stroke="#4f46e5" stroke-width="1"/>
  <text x="508" y="198" text-anchor="middle" fill="#6366f1" font-family="Arial" font-size="11">Components</text>
  <rect x="440" y="178" width="135" height="20" rx="4" fill="#1e1b4b"/>
  <rect x="440" y="202" width="135" height="20" rx="4" fill="#1e1b4b"/>
  <rect x="440" y="226" width="135" height="12" rx="4" fill="#1e1b4b"/>
  <rect x="585" y="165" width="145" height="80" rx="6" fill="#0f172a" stroke="#ec4899" stroke-width="1"/>
  <text x="658" y="198" text-anchor="middle" fill="#ec4899" font-family="Arial" font-size="11">API Routes</text>
  <rect x="590" y="178" width="135" height="20" rx="4" fill="#1e1b4b"/>
  <rect x="590" y="202" width="135" height="20" rx="4" fill="#1e1b4b"/>
  <rect x="590" y="226" width="135" height="12" rx="4" fill="#1e1b4b"/>
  <!-- Connector arrow -->
  <path d="M 390 200 L 430 200" stroke="url(#purple)" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Bottom label -->
  <rect x="0" y="355" width="800" height="95" fill="#1e1b4b"/>
  <text x="400" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-weight="900" font-size="30" letter-spacing="2">FULL STACK DEVELOPMENT</text>
  <text x="400" y="425" text-anchor="middle" fill="#a855f7" font-family="Arial, sans-serif" font-size="14">HTML · CSS · JS · Node.js · React · SQL</text>
</svg>
