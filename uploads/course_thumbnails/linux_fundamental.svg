<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="80" y="55" width="640" height="300" rx="12" fill="#020617" stroke="#334155" stroke-width="2.5"/>
  <rect x="80" y="55" width="640" height="38" rx="12" fill="#1e293b"/>
  <rect x="80" y="75" width="640" height="18" fill="#1e293b"/>
  <circle cx="110" cy="74" r="7" fill="#ef4444"/>
  <circle cx="132" cy="74" r="7" fill="#eab308"/>
  <circle cx="154" cy="74" r="7" fill="#22c55e"/>
  <text x="400" y="79" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="13">terminal — bash</text>
  <!-- Terminal lines -->
  <text x="110" y="130" fill="#38bdf8" font-family="monospace" font-size="22" font-weight="bold">$ </text>
  <text x="138" y="130" fill="#f8fafc" font-family="monospace" font-size="22">learn --module linux</text>
  <text x="110" y="170" fill="#22c55e" font-family="monospace" font-size="17">✔  Booting Linux Fundamentals...</text>
  <text x="110" y="205" fill="#94a3b8" font-family="monospace" font-size="15">›  File Systems &amp; Permissions ........... OK</text>
  <text x="110" y="233" fill="#94a3b8" font-family="monospace" font-size="15">›  Bash Scripting &amp; Automation .......... OK</text>
  <text x="110" y="261" fill="#94a3b8" font-family="monospace" font-size="15">›  Package Mgmt (apt/yum/dnf) ........... OK</text>
  <text x="110" y="289" fill="#94a3b8" font-family="monospace" font-size="15">›  Networking &amp; SSH ..................... OK</text>
  <text x="110" y="317" fill="#38bdf8" font-family="monospace" font-size="18">$ <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></text>
  <!-- Bottom label -->
  <rect x="0" y="375" width="800" height="75" fill="#0f172a"/>
  <text x="400" y="418" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-weight="900" font-size="30" letter-spacing="2">LINUX FUNDAMENTALS</text>
  <text x="400" y="440" text-anchor="middle" fill="#38bdf8" font-family="Arial, sans-serif" font-size="14">ASD Academy</text>
</svg>
