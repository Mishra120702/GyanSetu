<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Archery target (Eklavya's symbolic bow & arrow) -->
  <g transform="translate(230, 175)">
    <!-- Rings -->
    <circle cx="0" cy="0" r="140" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
    <circle cx="0" cy="0" r="100" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    <circle cx="0" cy="0" r="65" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <circle cx="0" cy="0" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#ffffff"/>
  </g>

  <!-- Arrow (flying in from right) -->
  <line x1="620" y1="95" x2="245" y2="177" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="237,175 250,165 252,183" fill="#ffffff"/>
  <!-- Feather -->
  <path d="M 618 97 L 630 85 M 618 97 L 630 108" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>

  <!-- Right: quote / info -->
  <text x="490" y="210" fill="rgba(255,255,255,0.8)" font-family="Arial" font-style="italic" font-size="18">"Aim. Learn. Excel."</text>
  <text x="490" y="245" fill="rgba(255,255,255,0.5)" font-family="Arial" font-size="14">Inspired by Eklavya</text>

  <!-- Stars decoration -->
  <text x="510" y="290" fill="#fde68a" font-family="Arial" font-size="20">★ ★ ★ ★ ★</text>

  <!-- Bottom label -->
  <rect x="0" y="355" width="800" height="95" fill="rgba(0,0,0,0.4)"/>
  <text x="400" y="400" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="36" letter-spacing="3">EKLAVYA</text>
  <text x="400" y="428" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="14">Dedication · Discipline · Excellence  |  B002</text>
</svg>
