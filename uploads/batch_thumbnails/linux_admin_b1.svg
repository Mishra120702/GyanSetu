<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1445"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid dots background -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Server stack group -->
  <g transform="translate(110, 70)">
    <!-- Server 1 -->
    <rect x="0" y="0" width="240" height="55" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
    <rect x="15" y="18" width="16" height="16" rx="3" fill="#10b981"/>
    <rect x="37" y="18" width="60" height="16" rx="3" fill="#1e40af"/>
    <text x="115" y="30" fill="#94a3b8" font-family="monospace" font-size="12">CPU: 42%</text>
    <circle cx="210" cy="27" r="5" fill="#22c55e"/>
    <circle cx="225" cy="27" r="5" fill="#22c55e"/>

    <!-- Server 2 -->
    <rect x="0" y="68" width="240" height="55" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
    <rect x="15" y="86" width="16" height="16" rx="3" fill="#f97316"/>
    <rect x="37" y="86" width="60" height="16" rx="3" fill="#1e40af"/>
    <text x="115" y="98" fill="#94a3b8" font-family="monospace" font-size="12">MEM: 78%</text>
    <circle cx="210" cy="95" r="5" fill="#22c55e"/>
    <circle cx="225" cy="95" r="5" fill="#eab308"/>

    <!-- Server 3 -->
    <rect x="0" y="136" width="240" height="55" rx="8" fill="#1e3a8a" stroke="#ef4444" stroke-width="2"/>
    <rect x="15" y="154" width="16" height="16" rx="3" fill="#ef4444"/>
    <rect x="37" y="154" width="60" height="16" rx="3" fill="#1e40af"/>
    <text x="115" y="166" fill="#94a3b8" font-family="monospace" font-size="12">DISK: 91%</text>
    <circle cx="210" cy="163" r="5" fill="#ef4444"/>
    <circle cx="225" cy="163" r="5" fill="#ef4444"/>

    <!-- Server 4 -->
    <rect x="0" y="204" width="240" height="55" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
    <rect x="15" y="222" width="16" height="16" rx="3" fill="#a855f7"/>
    <rect x="37" y="222" width="60" height="16" rx="3" fill="#1e40af"/>
    <text x="115" y="234" fill="#94a3b8" font-family="monospace" font-size="12">NET: OK</text>
    <circle cx="210" cy="231" r="5" fill="#22c55e"/>
    <circle cx="225" cy="231" r="5" fill="#22c55e"/>
  </g>

  <!-- Right: terminal output -->
  <rect x="400" y="70" width="350" height="260" rx="10" fill="#020617" stroke="#334155" stroke-width="2"/>
  <rect x="400" y="70" width="350" height="30" rx="10" fill="#1e293b"/>
  <rect x="400" y="90" width="350" height="10" fill="#1e293b"/>
  <circle cx="425" cy="85" r="5" fill="#ef4444"/>
  <circle cx="443" cy="85" r="5" fill="#eab308"/>
  <circle cx="461" cy="85" r="5" fill="#22c55e"/>
  <text x="575" y="90" text-anchor="middle" fill="#475569" font-family="monospace" font-size="11">root@server:~#</text>

  <text x="420" y="130" fill="#22c55e" font-family="monospace" font-size="13"># systemctl status nginx</text>
  <text x="420" y="155" fill="#38bdf8" font-family="monospace" font-size="12">● nginx.service - A high perf...</text>
  <text x="420" y="175" fill="#e2e8f0" font-family="monospace" font-size="12">   Loaded: loaded (/lib/systemd...)</text>
  <text x="420" y="195" fill="#22c55e" font-family="monospace" font-size="12">   Active: active (running) since</text>
  <text x="420" y="220" fill="#22c55e" font-family="monospace" font-size="13"># df -h | grep /dev/sda</text>
  <text x="420" y="245" fill="#e2e8f0" font-family="monospace" font-size="12">/dev/sda1   50G  46G  1.4G  98%</text>
  <text x="420" y="270" fill="#ef4444" font-family="monospace" font-size="12">⚠ Disk usage critical!</text>
  <text x="420" y="295" fill="#38bdf8" font-family="monospace" font-size="13"># journalctl -xe --follow</text>
  <text x="420" y="315" fill="#94a3b8" font-family="monospace" font-size="12">Jun 05 12:00:00 sshd[1234]...</text>

  <!-- Bottom label -->
  <rect x="0" y="355" width="800" height="95" fill="rgba(0,0,0,0.55)"/>
  <text x="400" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-weight="900" font-size="28" letter-spacing="2">LINUX ADMIN BATCH 1</text>
  <text x="400" y="428" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="14">Server Admin · Shell · Networking · Security  |  B001</text>
</svg>
