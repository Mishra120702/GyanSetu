<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Database cylinder left -->
  <g transform="translate(100, 80)">
    <ellipse cx="100" cy="30" rx="95" ry="25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2.5"/>
    <rect x="5" y="30" width="190" height="80" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2.5"/>
    <ellipse cx="100" cy="110" rx="95" ry="25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="100" y="76" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="14">SELECT * FROM</text>
    <text x="100" y="96" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="13">students;</text>

    <!-- Second cylinder (stacked) -->
    <ellipse cx="100" cy="160" rx="95" ry="25" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
    <rect x="5" y="160" width="190" height="70" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
    <ellipse cx="100" cy="230" rx="95" ry="25" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
    <text x="100" y="202" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="13">MongoDB / Redis</text>
  </g>

  <!-- API route list right -->
  <rect x="390" y="70" width="360" height="270" rx="10" fill="#0f0a1e" stroke="#7c3aed" stroke-width="2"/>
  <rect x="390" y="70" width="360" height="30" rx="10" fill="#1e1b4b"/>
  <rect x="390" y="90" width="360" height="10" fill="#1e1b4b"/>
  <text x="570" y="90" text-anchor="middle" fill="#7c3aed" font-family="monospace" font-size="12">routes/api.js</text>

  <text x="410" y="130" fill="#22c55e" font-family="monospace" font-size="13">GET    /api/users</text>
  <text x="410" y="155" fill="#3b82f6" font-family="monospace" font-size="13">POST   /api/auth/login</text>
  <text x="410" y="180" fill="#f59e0b" font-family="monospace" font-size="13">PUT    /api/users/:id</text>
  <text x="410" y="205" fill="#ef4444" font-family="monospace" font-size="13">DELETE /api/users/:id</text>
  <text x="410" y="235" fill="#94a3b8" font-family="monospace" font-size="12">// Middleware stack</text>
  <text x="410" y="258" fill="#a855f7" font-family="monospace" font-size="13">app.use(authMiddleware)</text>
  <text x="410" y="280" fill="#a855f7" font-family="monospace" font-size="13">app.use(rateLimit(...))</text>
  <text x="410" y="305" fill="#38bdf8" font-family="monospace" font-size="13">app.listen(8080)</text>

  <!-- Connector -->
  <path d="M 295 175 L 385 175" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="6 3"/>
  <polygon points="385,170 395,175 385,180" fill="#8b5cf6"/>

  <!-- Bottom label -->
  <rect x="0" y="355" width="800" height="95" fill="rgba(0,0,0,0.5)"/>
  <text x="400" y="398" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-weight="900" font-size="30" letter-spacing="2">BACKEND BATCH</text>
  <text x="400" y="428" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="14">Node.js · Express · SQL · NoSQL · REST APIs  |  B003</text>
</svg>
